<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in - Yuanti Wiki</title>
  <link rel="stylesheet" href="styles/common.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg,#f5f7fa 0%,#e4e8ec 100%);
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-card h1 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
    }
    .login-card .sub {
      text-align: center;
      color: #6b7280;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .login-card .btn-primary {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>Yuanti Wiki</h1>
      <p class="sub">Internal knowledge base · prototype demo</p>
      <form action="index.html">
        <div class="form-group">
          <label>Account</label>
          <input type="text" value="demo">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" value="***">
        </div>
        <button type="submit" class="btn btn-primary">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
