<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New user - Yuanti Wiki</title>
  <link rel="stylesheet" href="styles/common.css">
  <style>
    .main-wrap {
      padding-top: calc(52px + 16px);
      padding: 24px 24px 40px;
      max-width: 600px;
      margin: 0 auto;
    }
    .page-title {
      margin: 0 0 4px;
      font-size: 20px;
      font-weight: 600;
    }
    .page-sub {
      margin: 0 0 20px;
      font-size: 13px;
      color: #6b7280;
    }
    .form-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 20px 22px 22px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .form-group small {
      display: block;
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }
    .form-actions {
      margin-top: 20px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a href="index.html" class="logo">
      <img src="logo.jpg" alt="Yuanti Wiki">
      <span>Yuanti Wiki</span>
    </a>
    <div class="nav">
      <a href="user-management.html" class="btn btn-ghost">Back to users</a>
      <span class="user">System admin</span>
    </div>
  </header>
  <main class="main-wrap">
    <h1 class="page-title">New user</h1>
    <p class="page-sub">Create a new account. Only users created here can sign in.</p>
    <div class="form-card">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="e.g. alex">
        <small>Used for sign-in. Must be unique.</small>
      </div>
      <div class="form-group">
        <label for="displayName">Display name</label>
        <input id="displayName" type="text" placeholder="e.g. Alex Chen">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="text" placeholder="e.g. alex@example.com">
      </div>
      <div class="form-group">
        <label for="password">Initial password</label>
        <input id="password" type="password" placeholder="Set an initial password">
        <small>In a real system this would be auto-generated or sent via email.</small>
      </div>
      <div class="form-group">
        <label for="role">Role</label>
        <select id="role">
          <option>Viewer</option>
          <option>Editor</option>
          <option>Space admin</option>
          <option>System admin</option>
        </select>
      </div>
      <div class="form-actions">
        <a href="user-management.html" class="btn btn-secondary">Cancel</a>
        <button type="button" class="btn btn-primary">Create (demo only)</button>
      </div>
    </div>
  </main>
</body>
</html>
