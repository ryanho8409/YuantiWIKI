<!DOCTYPE html>
<html lang= en>
<head>
  <meta charset=UTF-8>
  <meta name=viewport content=width=device-width initial-scale=1>
  <title>Space permissions - Yuanti Wiki</title>
  <link rel=stylesheet href=styles/common.css>
  <style>
    .main-wrap { padding-top: calc(52px + 16px); padding: 24px; max-width: 900px; margin: 0 auto; }
    .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
    .page-title { margin:0; font-size:20px; font-weight:600; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius:10px; overflow:hidden; }
    .card-header { padding:16px 20px; border-bottom:1px solid #e5e7eb; font-weight:600; }
    table { width:100%; border-collapse:collapse; }
    th,td { padding:12px 20px; text-align:left; border-bottom:1px solid #e5e7eb; }
    th { font-size:12px; font-weight:600; color:#6b7280; text-transform:uppercase; }
    tr:last-child td { border-bottom:none; }
    .perm-select { padding:4px 8px; border:1px solid #e5e7eb; border-radius:4px; font-size:13px; }
  </style>
</head>
<body>
  <header class="app-header">
    <a href="index.html" class="logo">
      <img src="logo.jpg" alt="Yuanti Wiki">
      <span>Yuanti Wiki</span>
    </a>
    <div class="nav">
      <a href="space.html" class="btn btn-ghost">Back to space</a>
      <span class="user">demo</span>
    </div>
  </header>
  <main class="main-wrap" style="padding-top: calc(52px + 16px);">
    <div class="page-header">
      <h1 class="page-title">Space permissions · Product docs</h1>
      <button type="button" class="btn btn-primary">Save</button>
    </div>
    <div class="card">
      <div class="card-header">Members & roles</div>
      <table>
        <thead>
          <tr><th>Member</th><th>Permission</th></tr>
        </thead>
        <tbody>
          <tr>
            <td>Alex (Product)</td>
            <td>
              <select class="perm-select">
                <option>Read only</option>
                <option selected>Edit</option>
                <option>Admin</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>Lee (Dev)</td>
            <td>
              <select class="perm-select">
                <option>Read only</option>
                <option selected>Edit</option>
                <option>Admin</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>Zhang (QA)</td>
            <td>
              <select class="perm-select">
                <option selected>Read only</option>
                <option>Edit</option>
                <option>Admin</option>
              </select>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
